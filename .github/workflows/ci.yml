name: CI — HealthAI Coach

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # LINT & FORMAT (tous les services Python)
  # ─────────────────────────────────────────────
  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint API
        run: ruff check services/api/

      - name: Lint ETL
        run: ruff check services/etl/

      - name: Lint publications-api
        run: ruff check services/publications-api/

  # ─────────────────────────────────────────────
  # TESTS API (FastAPI + pytest)
  # ─────────────────────────────────────────────
  test-api:
    name: Tests API
    runs-on: ubuntu-latest
    needs: lint-python

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: healthai_test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: services/api
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: services/api
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/healthai_test_db
          SECRET_KEY: test_secret_key_for_ci
          DEBUG: true
        run: pytest tests/ -v --tb=short --junit-xml=report.xml

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-api
          path: services/api/report.xml

  # ─────────────────────────────────────────────
  # TESTS ETL (pytest)
  # ─────────────────────────────────────────────
  test-etl:
    name: Tests ETL
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: services/etl
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: services/etl
        run: pytest tests/ -v --tb=short --junit-xml=report.xml

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-etl
          path: services/etl/report.xml

  # ─────────────────────────────────────────────
  # TESTS API PUBLICATIONS (FastAPI + pytest + postgres)
  # ─────────────────────────────────────────────
  test-publications-api:
    name: Tests API Publications
    runs-on: ubuntu-latest
    needs: lint-python

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: healthai_pub_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: services/publications-api
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        working-directory: services/publications-api
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/healthai_pub_test
          API_SECRET_KEY: test_secret_key_for_ci
          MINIO_ENDPOINT: ""
          MINIO_ACCESS_KEY: ""
          MINIO_SECRET_KEY: ""
        run: |
          pytest tests/ -v --tb=short \
            --cov=. --cov-omit="tests/*" \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-publications-api
          path: services/publications-api/coverage.xml

  # ─────────────────────────────────────────────
  # BUILD Docker (vérification que tout compile)
  # ─────────────────────────────────────────────
  build-docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [test-api, test-etl, test-publications-api]
    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Build all images
        run: docker compose build

  # ─────────────────────────────────────────────
  # VALIDATION DÉMARRAGE (workflow_dispatch only)
  # Lance la stack complète et vérifie < 10 min
  # ─────────────────────────────────────────────
  validate-startup:
    name: Validate startup (< 10 min)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Make script executable
        run: chmod +x scripts/validate_startup.sh

      - name: Validate stack startup
        run: ./scripts/validate_startup.sh

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --tail=50
