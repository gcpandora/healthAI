# Override "perf" — ressources réduites pour tests de charge.
# grafana/metabase/maquettes/adminer désactivés via profiles: [disabled].
# Ollama limité à 256m pour forcer le fallback cascade vers le statique.
services:
  postgres:
    mem_limit: 256m
  api:
    mem_limit: 256m
  publications-api:
    mem_limit: 128m
  mongodb:
    mem_limit: 256m
  recommendation:
    mem_limit: 128m
  ai-api:
    mem_limit: 256m
  ollama:
    mem_limit: 256m
  frontend:
    mem_limit: 128m
  prometheus:
    mem_limit: 128m
    volumes:
      - ./monitoring/prometheus.perf.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/web.yml:/etc/prometheus/web.yml:ro
      - prometheus_data:/prometheus
  grafana:
    profiles: [disabled]
  metabase:
    profiles: [disabled]
  maquettes:
    profiles: [disabled]
  adminer:
    profiles: [disabled]
