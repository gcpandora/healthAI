global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus se scrappe lui-même
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # API FastAPI — nécessite prometheus-fastapi-instrumentator installé côté api
  # Si /metrics n'est pas exposé, Prometheus logge une erreur mais continue
  - job_name: healthai-api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  # Micro-service recommandations
  - job_name: healthai-recommendation
    static_configs:
      - targets: ["recommendation:8001"]
    metrics_path: /metrics

  # API Publications (réseau social)
  - job_name: publications-api
    static_configs:
      - targets: ["publications-api:8004"]
    metrics_path: /metrics

  # Métriques hôte (CPU, RAM, disque, réseau)
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  # Métriques containers Docker (CPU, mémoire, réseau par container)
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
