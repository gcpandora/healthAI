server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Collecte tous les containers Docker via leurs logs
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Utilise le nom du container comme label "container"
      - source_labels: [__meta_docker_container_name]
        regex: /(.+)
        target_label: container
      # Utilise l'image comme label "image"
      - source_labels: [__meta_docker_container_image]
        target_label: image
      # Ajoute le label "compose_service" depuis les labels Docker Compose
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: compose_service
      # Conserve uniquement les containers avec un nom (tous les healthAI containers)
      - source_labels: [__meta_docker_container_name]
        regex: /healthai_.+
        action: keep
    pipeline_stages:
      # Détecte le niveau de log depuis le message
      - regex:
          expression: '(?i)(level|severity)[\s=:]+(?P<level>debug|info|warning|warn|error|critical|fatal)'
      - labels:
          level:
