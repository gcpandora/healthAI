name: CI — HealthAI Coach

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  # ─────────────────────────────────────────────
  # LINT & FORMAT (tous les services Python)
  # ─────────────────────────────────────────────
  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint API
        run: ruff check services/api/

      - name: Lint ETL
        run: ruff check services/etl/

  # ─────────────────────────────────────────────
  # TESTS API (FastAPI + pytest)
  # ─────────────────────────────────────────────
  test-api:
    name: Tests API
    runs-on: ubuntu-latest
    needs: lint-python

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: healthai_test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: services/api
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: services/api
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/healthai_test_db
          SECRET_KEY: test_secret_key_for_ci
          DEBUG: true
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  # TESTS ETL (pytest)
  # ─────────────────────────────────────────────
  test-etl:
    name: Tests ETL
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: services/etl
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: services/etl
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  # BUILD Docker (vérification que tout compile)
  # ─────────────────────────────────────────────
  build-docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [test-api, test-etl]
    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Build all images
        run: docker compose build
