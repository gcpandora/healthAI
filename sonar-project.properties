sonar.projectKey=healthai-coach
sonar.projectName=HealthAI Coach
sonar.projectVersion=1.0

# Sources analysées
sonar.sources=services/api,services/publications-api,services/etl
sonar.tests=services/api/tests,services/publications-api/tests

# Exclusions
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/migrations/**,services/frontend/**,services/mobile/**

# Rapports de couverture (générés par pytest-cov)
sonar.python.coverage.reportPaths=services/api/coverage.xml,services/publications-api/coverage.xml

# Encodage
sonar.sourceEncoding=UTF-8

# Quality gate : couverture minimale 80 % configurée côté serveur SonarQube
